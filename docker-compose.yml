version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U appuser -d appdb' ]
      interval: 10s
      timeout: 5s
      retries: 5
  backend1:
    image: zicmabr/guess-game-backend:v1.0.1
    restart: unless-stopped
    environment:
      FLASK_DB_TYPE: postgres
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
      FLASK_DB_NAME: appdb
      FLASK_DB_USER: appuser
      FLASK_DB_PASSWORD: apppass
    depends_on:
      postgres:
        condition: service_healthy
  backend2:
    image: zicmabr/guess-game-backend:v1.0.1
    restart: unless-stopped
    environment:
      FLASK_DB_TYPE: postgres
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
      FLASK_DB_NAME: appdb
      FLASK_DB_USER: appuser
      FLASK_DB_PASSWORD: apppass
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    image: zicmabr/guess-game-frontend:v1.0.0
    restart: unless-stopped
  nginx:
    image: zicmabr/guess-game-nginx:v1.0.0
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend1
      - backend2
volumes:
  postgres_data:
